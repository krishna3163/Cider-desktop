name: Build and Release Cider

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PIP_BREAK_SYSTEM_PACKAGES: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install

      - name: Build Assets
        run: npm run build

      - name: Package App for Windows
        if: matrix.os == 'windows-latest'
        run: npm run dist:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package App for Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package App for macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish=never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release / Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/Cider-Setup-*.exe
            dist/Cider-Setup-*.exe.blockmap
            dist/*.zip
            dist/cider_*_amd64.deb
            dist/cider-*.AppImage
            dist/cider-*.rpm
            dist/Cider-*.dmg
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
